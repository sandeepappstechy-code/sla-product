services:
  # 1. The AI Engine (Python/FastAPI)
  - type: web
    name: sla-agno-engine
    env: python
    rootDir: agno-engine
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn agno_api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false

  # 2. The Backend (Laravel/PHP via Docker)
  - type: web
    name: sla-backend
    env: docker # Use Docker for Laravel
    rootDir: backend
    plan: free
    envVars:
      - key: APP_KEY
        generateValue: true
      - key: AGNO_SERVICE_URL
        fromService:
          type: web
          name: sla-agno-engine
          property: host
