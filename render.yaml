services:
  # 1. The AI Engine (Python/FastAPI)
  - type: web
    name: sla-agno-engine
    env: python
    rootDir: agno-engine
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn agno_api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false

  # 2. The Backend (Laravel/PHP)
  - type: web
    name: sla-backend
    env: php
    rootDir: backend
    buildCommand: composer install --no-dev
    startCommand: php artisan serve --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_KEY
        generateValue: true
      - key: AGNO_SERVICE_URL
        fromService:
          name: sla-agno-engine
          type: host

static_sites:
  # 3. The Frontend (Static Dashboard)
  - name: sla-frontend
    buildCommand: ""
    publishDir: frontend
    routes:
      - type: rewrite
        source: /(.*)
        destination: /index.html
