services:
  # 1. The AI Engine (Python/FastAPI)
  - type: web
    name: sla-agno-engine
    env: python
    plan: free
    rootDir: agno-engine
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn agno_api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: AGNO_LOG_LEVEL
        value: INFO




  # 3. The Frontend (Static Site)
  - type: web
    name: sla-frontend
    env: static
    staticPublishPath: frontend
    envVars:
      - key: SLA_BACKEND_URL
        value: https://sla-agno-engine.onrender.com

